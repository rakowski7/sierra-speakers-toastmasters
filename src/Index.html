<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sierra Speakers">
  <link rel="manifest" href="data:application/json;base64,<?!= Utilities.base64Encode(HtmlService.createHtmlOutputFromFile('Manifest').getContent()) ?>">
  <title>Sierra Speakers</title>
  <?!= include('Styles') ?>
</head>
<body>

  <!-- ═══════════ APP SHELL ═══════════ -->
  <div id="app">

    <!-- Header -->
    <header id="app-header">
      <div class="header-content">
        <div class="header-brand">
          <div class="logo-icon">SS</div>
          <div class="header-text">
            <div class="header-title">Sierra Speakers</div>
            <div class="header-subtitle">TOASTMASTERS</div>
          </div>
        </div>
        <button id="refresh-btn" class="icon-btn" onclick="App.refresh()" title="Refresh">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
        </button>
      </div>
    </header>

    <!-- Loading State -->
    <div id="loading-screen" class="view active">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading schedule...</p>
    </div>

    <!-- ═══════════ VIEW: SCHEDULE ═══════════ -->
    <div id="view-schedule" class="view">
      <div class="view-content">
        <!-- My Roles Banner (shows if user has upcoming roles) -->
        <div id="my-roles-banner" class="my-roles-banner" style="display:none;">
          <div class="banner-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Your Upcoming Roles</span>
          </div>
          <div id="my-roles-list" class="my-roles-list"></div>
        </div>

        <!-- Meetings List -->
        <div id="meetings-list" class="meetings-list"></div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <p>No upcoming meetings found.</p>
        </div>
      </div>
    </div>

    <!-- ═══════════ VIEW: MEETING DETAILS ═══════════ -->
    <div id="view-meeting" class="view">
      <div class="view-content">
        <button class="back-btn" onclick="App.showView('schedule')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Schedule
        </button>
        <div id="meeting-details"></div>
      </div>
    </div>

    <!-- ═══════════ VIEW: CONFIRM ROLE ═══════════ -->
    <div id="view-confirm" class="view">
      <div class="view-content">
        <button class="back-btn" onclick="App.showView('schedule')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </button>
        <div id="confirm-content"></div>

        <!-- All Roles Section -->
        <div id="all-roles-section" class="all-roles-section" style="display:none;">
          <div class="all-roles-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <h2>All Roles</h2>
          </div>
          <select id="all-roles-date-select" class="all-roles-dropdown" onchange="App.allRolesDateChanged(this.value)"></select>
          <div id="all-roles-list"></div>
        </div>
      </div>
    </div>

    <!-- ═══════════ VIEW: ADMIN ═══════════ -->
    <div id="view-admin" class="view">
      <div class="view-content">
        <button class="back-btn" onclick="App.showView('schedule')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </button>
        <div class="section-header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <h2>Admin Actions</h2>
        </div>
        <div id="admin-content">
          <div class="admin-actions">
            <button class="admin-btn admin-btn-confirm" onclick="App.startWizard('confirmations')">
              <div class="admin-btn-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <div class="admin-btn-text">
                <strong>Send Role Confirmations</strong>
                <small>Draft confirmation emails for each assigned member</small>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>

            <button class="admin-btn admin-btn-agenda" onclick="App.startWizard('agenda')">
              <div class="admin-btn-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              </div>
              <div class="admin-btn-text">
                <strong>Generate Meeting Agenda</strong>
                <small>Build the .docx agenda with Word of the Day and speeches</small>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>

            <button class="admin-btn admin-btn-email" onclick="App.startWizard('clubemail')">
              <div class="admin-btn-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              </div>
              <div class="admin-btn-text">
                <strong>Draft Club Meeting Email</strong>
                <small>AI-generated club announcement with meeting details</small>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>

            <a class="admin-btn admin-btn-sheet" href="https://docs.google.com/spreadsheets/d/<?= '1gLWiPXAzW_LXw-7_GDG7ykaGOB2faa3WcY6h18qH-rw' ?>/edit" target="_blank">
              <div class="admin-btn-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
              </div>
              <div class="admin-btn-text">
                <strong>Open Schedule Sheet</strong>
                <small>View and edit the full schedule in Google Sheets</small>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════ VIEW: WIZARD (shared container for all admin wizards) ═══════════ -->
    <div id="view-wizard" class="view">
      <div class="view-content">
        <button class="back-btn" id="wizard-back-btn" onclick="App.wizardBack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span id="wizard-back-label">Back</span>
        </button>

        <!-- Wizard progress bar -->
        <div class="wizard-progress" id="wizard-progress">
          <div class="wizard-progress-bar">
            <div class="wizard-progress-fill" id="wizard-progress-fill"></div>
          </div>
          <div class="wizard-step-label" id="wizard-step-label">Step 1 of 5</div>
        </div>

        <!-- Wizard title -->
        <div class="wizard-title" id="wizard-title"></div>

        <!-- Dynamic wizard content rendered by JS -->
        <div id="wizard-body"></div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-btn active" onclick="App.showView('schedule')" data-view="schedule">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Schedule</span>
      </button>
      <button class="nav-btn" onclick="App.showView('confirm')" data-view="confirm">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>My Roles</span>
      </button>
      <? if (isAdmin) { ?>
      <button class="nav-btn" onclick="App.showView('admin')" data-view="admin">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Admin</span>
      </button>
      <? } ?>
    </nav>

  </div>

  <!-- Config injection -->
  <script>
    window.APP_CONFIG = <?!= config ?>;
  </script>
  <?!= include('JavaScript') ?>

</body>
</html>
